<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen JavaScript - Generador de menú para restaurante</title>

    <style>
        /* ==============================
           ESTILOS GENERALES
           En esta zona se define el aspecto visual de toda la página.
        ============================== */

        /* Estilos generales del cuerpo de la página */
        body {
            font-family: Arial, sans-serif; /* Define la fuente principal de toda la página */
            margin: 0; /* Elimina el margen por defecto del navegador */
            background-color: #f4f4f4; /* Aplica un color gris claro al fondo general */
            color: #222; /* Define el color principal del texto */
        }

        /* Estilos de la cabecera superior de la página */
        header {
            background-color: #222; /* Aplica un fondo oscuro a la cabecera */
            color: white; /* Pone el texto de la cabecera en color blanco */
            padding: 20px; /* Añade espacio interior alrededor del contenido */
            text-align: center; /* Centra el texto de la cabecera */
        }

        /* Contenedor principal donde se colocan las secciones */
        main {
            display: grid; /* Activa CSS Grid para organizar las zonas de la página */
            grid-template-columns: 1fr 1.5fr 1.5fr; /* Crea tres columnas: controles, carta y menú */
            gap: 20px; /* Añade separación entre columnas y filas */
            padding: 20px; /* Añade espacio interior alrededor del contenido principal */
        }

        /* Clase para la barra superior donde aparecen el día y la frase */
        .barra-superior {
            grid-column: 1 / -1; /* Hace que la barra ocupe todas las columnas del grid */
        }

        /* Estilos comunes para todas las secciones */
        section {
            background-color: white; /* Aplica fondo blanco a cada bloque */
            padding: 20px; /* Añade espacio interior dentro de cada sección */
            border-radius: 8px; /* Redondea las esquinas de las secciones */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); /* Añade una sombra suave */
        }

        /* Estilos para los títulos de segundo nivel */
        h2 {
            margin-top: 0; /* Elimina el margen superior para alinear mejor el título */
        }

        /* Estilos de las etiquetas de formulario */
        label {
            display: block; /* Hace que cada etiqueta ocupe una línea completa */
            margin-top: 15px; /* Añade separación superior respecto al elemento anterior */
            font-weight: bold; /* Pone el texto de la etiqueta en negrita */
        }

        /* Estilos comunes para inputs, selectores y botones */
        input,
        select,
        button {
            width: 100%; /* Hace que ocupen todo el ancho disponible */
            padding: 8px; /* Añade espacio interior para mejorar la lectura */
            margin-top: 5px; /* Añade una pequeña separación superior */
            box-sizing: border-box; /* Incluye padding y borde dentro del ancho total */
        }

        /* Estilos específicos de los botones */
        button {
            cursor: pointer; /* Cambia el cursor para indicar que se puede hacer clic */
            background-color: #222; /* Aplica fondo oscuro al botón */
            color: white; /* Pone el texto del botón en blanco */
            border: none; /* Elimina el borde por defecto */
            margin-top: 15px; /* Añade separación superior entre botones o controles */
            border-radius: 4px; /* Redondea ligeramente las esquinas del botón */
        }

        /* Estilos del botón cuando el ratón pasa por encima */
        button:hover {
            background-color: #444; /* Cambia el fondo para indicar interacción */
        }

        /* Clase para cada tarjeta o bloque de plato */
        .plato {
            border: 1px solid #ddd; /* Añade un borde gris claro alrededor del plato */
            padding: 12px; /* Añade espacio interior dentro de la tarjeta */
            margin-bottom: 12px; /* Separa un plato del siguiente */
            border-radius: 6px; /* Redondea las esquinas de la tarjeta */
            background-color: #fafafa; /* Aplica un fondo muy claro a cada plato */
        }

        /* Estilos del título de cada plato */
        .plato h3 {
            margin-top: 0; /* Elimina el margen superior del título del plato */
        }

        /* Estilos de la imagen de cada plato */
        .plato img {
            width: 100%; /* Hace que la imagen use el ancho disponible */
            max-width: 180px; /* Limita el tamaño máximo de la imagen */
            display: block; /* Hace que la imagen se comporte como bloque */
            margin-top: 10px; /* Añade separación entre el texto y la imagen */
            border-radius: 6px; /* Redondea las esquinas de la imagen */
        }

        /* Clase que se aplica cuando la carta está vacía */
        .carta-vacia {
            border: 2px dashed #999; /* Añade un borde punteado para indicar estado vacío */
            color: #666; /* Usa un color gris para el texto del mensaje */
            text-align: center; /* Centra el texto dentro del contenedor */
            padding: 30px; /* Añade más espacio interior al mensaje vacío */
            border-radius: 8px; /* Redondea las esquinas del contenedor vacío */
        }

        /* Clase para ocultar una sección */
        .oculto {
            display: none; /* Oculta completamente el elemento */
        }

        /* Clase para la cabecera donde aparecen día y frase */
        .cabecera-menu {
            background-color: #fff3cd; /* Aplica un fondo amarillo suave */
            padding: 10px; /* Añade espacio interior */
            margin-bottom: 15px; /* Separa la cabecera del contenido inferior */
            border-radius: 6px; /* Redondea las esquinas de la cabecera */
            font-weight: bold; /* Resalta el texto en negrita */
        }

        /* Media query para adaptar el diseño a pantallas pequeñas */
        @media (max-width: 900px) {
            /* En pantallas pequeñas, el contenido pasa a una sola columna */
            main {
                grid-template-columns: 1fr; /* Cambia el grid a una única columna */
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Generador de menú para restaurante</h1>
</header>

<main>

    <!-- =====================================================
         BARRA SUPERIOR: DÍA Y FRASE
         Debe mostrarse siempre, tanto entre semana como en fin de semana.
    ====================================================== -->
    <section class="barra-superior">
        <div id="cabeceraMenu" class="cabecera-menu">
            Día seleccionado: <span id="dia-cambiar">lunes</span> | Frase del día: <span id="frase-cambiar"> todavía no se ha escrito ninguna frase.</span>
        </div>
    </section>

    <!-- =====================================================
         ZONA IZQUIERDA: FORMULARIO Y CONTROLES
    ====================================================== -->
    <section>
        <h2>Controles</h2>

        <!-- Ejercicio 1: input de frase del día -->
        <label for="fraseDia">Frase del día</label>
        <input type="text" id="fraseDia" placeholder="Escribe la frase del día">

        <!-- Ejercicio 2: selector de día de la semana -->
        <label for="selectorDia">Día de la semana</label>
        <select id="selectorDia">
            <option value="lunes">Lunes</option>
            <option value="martes">Martes</option>
            <option value="miercoles">Miércoles</option>
            <option value="jueves">Jueves</option>
            <option value="viernes">Viernes</option>
            <option value="sabado">Sábado</option>
            <option value="domingo">Domingo</option>
        </select>

        <!-- Ejercicio 5: selector de platos generado desde el array -->
        <label for="selectorPlatos">Selecciona un plato</label>
        <select id="selectorPlatos"></select>

        <button id="btnAgregar">Añadir plato a la carta</button>

        <!-- Ejercicio 4: botón para vaciar la carta -->
        <button id="btnVaciar">Vaciar carta</button>
    </section>

    <!-- =====================================================
         ZONA CENTRAL: CARTA
    ====================================================== -->
    <section id="seccionCarta">
        <h2>Carta</h2>
        <div id="contenedorCarta"></div>
    </section>

    <!-- =====================================================
         ZONA DERECHA: MENÚ
    ====================================================== -->
    <section id="seccionMenu">
        <h2>Menú del día</h2>

        <!-- Ejercicio 7: aquí se pinta el menú dividido en primeros y segundos -->
        <div id="contenedorMenu"></div>
    </section>

</main>

<script>
    /* =====================================================
       DATOS INICIALES
       Array principal que simula una base de datos.
       No usamos id porque el ejercicio trabaja con el índice del array.
    ====================================================== */

    let platosDisponibles = [
        {
            nombre: "Ensalada César",
            descripcion: "Ensalada con pollo, lechuga, queso y salsa César",
            tipo: "primero",
            precio: 8.50,
            foto: "ensalada.jpg"
        },
        {
            nombre: "Macarrones boloñesa",
            descripcion: "Pasta con salsa de tomate y carne picada",
            tipo: "primero",
            precio: 9.00,
            foto: "macarrones.jpg"
        },
        {
            nombre: "Pollo al horno",
            descripcion: "Pollo asado con patatas",
            tipo: "segundo",
            precio: 11.50,
            foto: "pollo.jpg"
        },
        {
            nombre: "Merluza a la plancha",
            descripcion: "Merluza con verduras salteadas",
            tipo: "segundo",
            precio: 12.00,
            foto: "merluza.jpg"
        }
    ];

    /*
        Array donde se guardan los platos que el usuario añade.
        Al principio está vacío.
    */
    let platos = [
        {
            nombre: "Ensalada César",
            descripcion: "Ensalada con pollo, lechuga, queso y salsa César",
            tipo: "primero",
            precio: 8.50,
            foto: "ensalada.jpg"
        },
        {
            nombre: "Macarrones boloñesa",
            descripcion: "Pasta con salsa de tomate y carne picada",
            tipo: "primero",
            precio: 9.00,
            foto: "macarrones.jpg"
        },
        {
            nombre: "Pollo al horno",
            descripcion: "Pollo asado con patatas",
            tipo: "segundo",
            precio: 11.50,
            foto: "pollo.jpg"
        },
        {
            nombre: "Merluza a la plancha",
            descripcion: "Merluza con verduras salteadas",
            tipo: "segundo",
            precio: 12.00,
            foto: "merluza.jpg"
        }
    ];


    // Cambiar frase dia ------------------------------------------------
    const fraseDia = document.querySelector("#fraseDia")
    const fraseCambiar = document.querySelector("#frase-cambiar")
    fraseDia.addEventListener("input", cambiarFrase)
    function cambiarFrase(){
        let texto = fraseDia.value
        document.querySelector("#frase-cambiar").innerHTML = texto
    }

    // Cambiar dia -------------------------------------------------------
    let dia = document.querySelector("#selectorDia")
    const diaCambiar = document.querySelector("#dia-cambiar")

    function cambiarDia(){
        let diaCambiado = dia.value
        diaCambiar.innerHTML = diaCambiado
    }

    dia.addEventListener("change", cambiarDia)

// pintar carta ---------------------------------------------------------------
    function pintarCarta() {
    let html = "";

    for (let i = 0; i < platosDisponibles.length; i++) {
        html += `
          <div class="card">
            <h3>${platosDisponibles[i].nombre} </h3>
            <p> Descripción: ${platosDisponibles[i].descripcion} </p>
            <p style="font-weight:700;"> Precio: ${platosDisponibles[i].precio} </p>
            <img src="img/${platosDisponibles[i].foto}" alt="${platosDisponibles[i].nombre}">
          </div>
        `;
    }

    document.querySelector("#contenedorCarta").innerHTML = html;
}
pintarCarta();


// Vaciar carta ------------------------------------------------------------

let btnrm = document.querySelector("#btnVaciar")
let carta = document.querySelector("#contenedorCarta")
btnrm.addEventListener("click", function(){
    carta.classList.add("carta-vacia")
    carta.innerHTML = "No hay platos que mostrar"
    
})



// Pintar menu dia -------------------------------------------------------

function pintarMenuDia() {

    let primeros = "";
    let segundos = "";

    for (let i = 0; i < platos.length; i++) {

        if (platos[i].tipo === "primero") {
            primeros += `
                <div class="card">
                    <h3>${platos[i].nombre}</h3>
                    <p>${platos[i].descripcion}</p>
                    <p>${platos[i].precio} €</p>
                </div>
            `;
        }

        if (platos[i].tipo === "segundo") {
            segundos += `
                <div class="card">
                    <h3>${platos[i].nombre}</h3>
                    <p>${platos[i].descripcion}</p>
                    <p>${platos[i].precio} €</p>
                </div>
            `;
        }
    }

    document.querySelector("#contenedorMenu").innerHTML =
        "<h3>Primeros</h3>" + primeros +
        "<h3>Segundos</h3>" + segundos;
}
pintarMenuDia()


// Añadir platos a carta ------------------------------------------------------



</script>
</body>
</html>
